<style>

body{background:var(--bg);color:#c8c8d0;font-family:var(--f);overflow:hidden;height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px}
@keyframes live{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 6px rgba(6,214,160,.2)}50%{box-shadow:0 0 16px rgba(6,214,160,.5)}}
input::placeholder{color:rgba(255,255,255,0.2)}input:focus{outline:none}

/* Layout */
.header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(4,4,10,0.98);position:sticky;top:0;z-index:100}
.main{display:flex;height:calc(100vh - 46px)}
.sidebar{width:200px;min-width:200px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(255,255,255,0.006)}
.center{flex:1;display:flex;flex-direction:column;overflow:hidden}
.right{width:260px;min-width:260px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:rgba(255,255,255,0.005)}

/* Watchlist */
.wl-item{padding:8px 10px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.02);transition:background .15s;display:flex;align-items:center;justify-content:space-between}
.wl-item:hover{background:rgba(255,255,255,0.03)}
.wl-item.act{background:rgba(6,214,160,0.06);border-left:2px solid var(--green)}

/* Buttons */
.tf-btn{padding:3px 10px;border-radius:4px;border:1px solid transparent;cursor:pointer;font-size:10px;font-family:var(--f);background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.3);transition:all .15s}
.tf-btn:hover{background:rgba(255,255,255,0.04)}
.tf-btn.act{background:rgba(6,214,160,0.1);color:var(--green);border-color:rgba(6,214,160,0.2)}

/* Search */
.sr{padding:8px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.02);transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.sr:hover{background:rgba(6,214,160,0.06)}

/* Signal log */
.sig-item{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,0.015);cursor:pointer;transition:background .1s}
.sig-item:hover{background:rgba(255,255,255,0.02)}

/* Indicator badge */
.ind-badge{padding:4px 8px;border-radius:5px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);text-align:center}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#0c0c18;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:24px;width:400px;max-width:90vw}

/* Responsive */
@media(max-width:900px){.sidebar{width:160px;min-width:160px}.right{width:220px;min-width:220px}}
@media(max-width:700px){.sidebar{display:none}.right{display:none}}

/*═══════════════════════════════════════════════════════════════
  API LAYER
═══════════════════════════════════════════════════════════════*/
let cachedJWT = null;
let jwtExpiry = 0;

async function getJWT() {
  if (cachedJWT && Date.now() < jwtExpiry) return cachedJWT;
  try {
    const r = await fetch("/api/auth");
    const d = await r.json();
    if (d.success) { cachedJWT = d.jwtToken; jwtExpiry = Date.now() + 6*60*60*1000; return cachedJWT; }
    throw new Error(d.error || "Auth failed");
  } catch(e) { console.error("Auth error:", e); return null; }
}

async function fetchCandles(item, interval="FIVE_MINUTE") {
  const jwt = await getJWT();
  if (!jwt) throw new Error("Not authenticated");
  const now = new Date();
  const to = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")} 15:30`;
  const from = new Date(now); from.setDate(from.getDate()-7);
  const fromStr = `${from.getFullYear()}-${String(from.getMonth()+1).padStart(2,"0")}-${String(from.getDate()).padStart(2,"0")} 09:15`;
  const params = new URLSearchParams({token:item.token, exchange:item.exchange, interval, from:fromStr, to, jwt});
  const r = await fetch(`/api/candles?${params}`);
  const d = await r.json();
  if (d.status===true && d.data) {
    return d.data.map(c => ({time:new Date(c[0]),open:c[1],high:c[2],low:c[3],close:c[4],volume:c[5]}));
  }
  throw new Error(d.message || "No candle data");
}

async function fetchLTP(items) {
  const jwt = await getJWT();
  if (!jwt) return {};
  const byExch = {};
  items.forEach(i => { if(!byExch[i.exchange]) byExch[i.exchange]=[]; byExch[i.exchange].push(i.token); });
  const results = {};
  for (const [exch, tokens] of Object.entries(byExch)) {
    try {
      const params = new URLSearchParams({exchange:exch, tokens:tokens.join(","), mode:"LTP", jwt});
      const r = await fetch(`/api/ltp?${params}`);
      const d = await r.json();
      if (d.status && d.data?.fetched) d.data.fetched.forEach(q => { results[q.symbolToken] = q.ltp; });
    } catch {}
  }
  return results;
}

// Simulated fallback
function simCandles(base,vol,n=80){const c=[];let p=base;for(let i=0;i<n;i++){const o=p,cl=p+(Math.random()-.48)*vol;const h=Math.max(o,cl)+Math.random()*vol*.5,l=Math.min(o,cl)-Math.random()*vol*.5;const t=new Date();t.setMinutes(t.getMinutes()-(n-i)*5);c.push({time:t,open:o,high:h,low:l,close:cl,volume:Math.round(40000+Math.random()*60000)});p=cl;}return c;}
const SIM={99926000:[24500,35],99926009:[52800,80],99919000:[81000,120],99926037:[20500,30],99926074:[13200,25],2885:[1250,15],11536:[3800,30],1333:[1650,18],1594:[1500,16],3045:[780,10],1660:[440,5]};

/*═══════════════════════════════════════════════════════════════
  INDICATORS
═══════════════════════════════════════════════════════════════*/
const ema=(d,p)=>{const k=2/(p+1),e=[d[0]];for(let i=1;i<d.length;i++)e.push(d[i]*k+e[i-1]*(1-k));return e;};
function calcRSI(c,p=14){const r=Array(c.length).fill(50);if(c.length<p+1)return r;let ag=0,al=0;for(let i=1;i<=p;i++){const d=c[i]-c[i-1];d>0?ag+=d:al+=Math.abs(d);}ag/=p;al/=p;r[p]=al===0?100:100-100/(1+ag/al);for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?Math.abs(d):0))/p;r[i]=al===0?100:100-100/(1+ag/al);}return r;}
function calcMACD(c){const e12=ema(c,12),e26=ema(c,26),ml=e12.map((v,i)=>v-e26[i]),sl=ema(ml,9);return{macdLine:ml,signalLine:sl,histogram:ml.map((v,i)=>v-sl[i])};}
function calcVWAP(cd){let cv=0,cq=0;return cd.map(c=>{const tp=(c.high+c.low+c.close)/3;cv+=tp*c.volume;cq+=c.volume;return cq===0?c.close:cv/cq;});}
function calcST(cd,p=10,m=3){const st=[],dir=[],atr=[];for(let i=0;i<cd.length;i++){if(i===0){atr.push(cd[0].high-cd[0].low);st.push(cd[0].close);dir.push(1);continue;}const tr=Math.max(cd[i].high-cd[i].low,Math.abs(cd[i].high-cd[i-1].close),Math.abs(cd[i].low-cd[i-1].close));atr.push(i<p?tr:(atr[i-1]*(p-1)+tr)/p);const hl=(cd[i].high+cd[i].low)/2;const ub=hl+m*atr[i],lb=hl-m*atr[i];if(cd[i].close>(st[i-1]||0)){st.push(Math.max(lb,st[i-1]||lb));dir.push(1);}else{st.push(Math.min(ub,st[i-1]||ub));dir.push(-1);}}return{supertrend:st,direction:dir};}

function analyze(candles){
  if(candles.length<30)return null;
  const cl=candles.map(c=>c.close),e9=ema(cl,9),e21=ema(cl,21),rsiData=calcRSI(cl),macdData=calcMACD(cl),vwapData=calcVWAP(candles),stData=calcST(candles);
  const signals=candles.map((c,i)=>{
    if(i<26)return{type:null,strength:0,reasons:[]};
    let bull=0,bear=0;const reasons=[];
    if(e9[i]>e21[i]&&e9[i-1]<=e21[i-1]){bull+=2;reasons.push("EMA×▲");}else if(e9[i]>e21[i]){bull+=1;reasons.push("EMA+");}
    if(e9[i]<e21[i]&&e9[i-1]>=e21[i-1]){bear+=2;reasons.push("EMA×▼");}else if(e9[i]<e21[i]){bear+=1;reasons.push("EMA−");}
    if(rsiData[i]<30){bull+=1.5;reasons.push("RSI<30");}else if(rsiData[i]<40){bull+=.5;reasons.push("RSI<40");}
    if(rsiData[i]>70){bear+=1.5;reasons.push("RSI>70");}else if(rsiData[i]>60){bear+=.5;reasons.push("RSI>60");}
    if(macdData.histogram[i]>0&&macdData.histogram[i-1]<=0){bull+=1.5;reasons.push("MACD▲");}else if(macdData.histogram[i]>0){bull+=.5;reasons.push("MACD+");}
    if(macdData.histogram[i]<0&&macdData.histogram[i-1]>=0){bear+=1.5;reasons.push("MACD▼");}else if(macdData.histogram[i]<0){bear+=.5;reasons.push("MACD−");}
    if(c.close>vwapData[i]){bull+=1;reasons.push(">VWAP");}if(c.close<vwapData[i]){bear+=1;reasons.push("<VWAP");}
    if(stData.direction[i]===1&&stData.direction[i-1]===-1){bull+=2;reasons.push("ST▲");}else if(stData.direction[i]===1){bull+=1;reasons.push("ST+");}
    if(stData.direction[i]===-1&&stData.direction[i-1]===1){bear+=2;reasons.push("ST▼");}else if(stData.direction[i]===-1){bear+=1;reasons.push("ST−");}
    if(bull>=3.5&&bull>bear+1)return{type:"BUY",strength:Math.min(bull/7,1),reasons:reasons.filter(r=>!r.includes("−")&&!r.includes("▼")&&!r.includes("<VWAP")&&!r.includes(">70")&&!r.includes(">60"))};
    if(bear>=3.5&&bear>bull+1)return{type:"SELL",strength:Math.min(bear/7,1),reasons:reasons.filter(r=>!r.includes("+")&&!r.includes("▲")&&!r.includes(">VWAP")&&!r.includes("<30")&&!r.includes("<40"))};
    return{type:null,strength:0,reasons:[]};
  });
  return{signals,ema9:e9,ema21:e21,rsi:rsiData,macd:macdData,vwap:vwapData,supertrend:stData};
}

/*═══════════════════════════════════════════════════════════════
  CHART COMPONENT
═══════════════════════════════════════════════════════════════*/
function PriceChart({candles,ind,signals,dec}){
  const ref=useRef(null);const[tip,setTip]=useState(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv||!candles.length)return;
    const ctx=cv.getContext("2d");const dpr=window.devicePixelRatio||1;const rect=cv.getBoundingClientRect();
    cv.width=rect.width*dpr;cv.height=rect.height*dpr;ctx.scale(dpr,dpr);
    const W=rect.width,H=rect.height,cT=14,cB=H-26,cH=cB-cT,cL=66,cR=W-8,cW=cR-cL;
    ctx.clearRect(0,0,W,H);
    const allP=candles.flatMap(c=>[c.high,c.low]);const mn=Math.min(...allP),mx=Math.max(...allP),rn=mx-mn||1,pd=rn*.06;
    const yS=v=>cT+cH*(1-(v-mn+pd)/(rn+pd*2)),xS=i=>cL+(i/Math.max(candles.length-1,1))*cW;
    // Grid
    for(let i=0;i<=4;i++){const y=cT+(cH/4)*i;ctx.strokeStyle="rgba(255,255,255,0.025)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cL,y);ctx.lineTo(cR,y);ctx.stroke();const p=mx+pd-((rn+pd*2)/4)*i;ctx.fillStyle="rgba(255,255,255,0.22)";ctx.font="9px monospace";ctx.textAlign="right";ctx.fillText(p.toFixed(dec),cL-5,y+3);}
    // Indicator lines
    const drawL=(data,col,w=1.1,dash=[])=>{if(!data?.length)return;ctx.strokeStyle=col;ctx.lineWidth=w;ctx.setLineDash(dash);ctx.beginPath();data.forEach((v,i)=>{i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v));});ctx.stroke();ctx.setLineDash([]);};
    if(ind){drawL(ind.ema9,"#06d6a0",1.2);drawL(ind.ema21,"#ef476f",1.2);drawL(ind.vwap,"rgba(255,209,102,0.35)",1,[3,3]);
    if(ind.supertrend?.supertrend){for(let i=1;i<ind.supertrend.supertrend.length;i++){ctx.strokeStyle=ind.supertrend.direction[i]===1?"rgba(6,214,160,0.5)":"rgba(239,71,111,0.5)";ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(xS(i-1),yS(ind.supertrend.supertrend[i-1]));ctx.lineTo(xS(i),yS(ind.supertrend.supertrend[i]));ctx.stroke();}}}
    // Candles
    const cWid=Math.max(1.5,cW/candles.length*.5);candles.forEach((c,i)=>{const x=xS(i),bull=c.close>=c.open;const bT=yS(Math.max(c.open,c.close)),bB=yS(Math.min(c.open,c.close));ctx.strokeStyle=bull?"#06d6a0":"#ef476f";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,yS(c.high));ctx.lineTo(x,yS(c.low));ctx.stroke();ctx.fillStyle=bull?"#06d6a0":"#ef476f";ctx.fillRect(x-cWid/2,bT,cWid,Math.max(1,bB-bT));});
    // Signals
    if(signals)signals.forEach((s,i)=>{if(!s.type)return;const x=xS(i),buy=s.type==="BUY";const y=buy?yS(candles[i].low)+14:yS(candles[i].high)-14;ctx.save();ctx.beginPath();if(buy){ctx.moveTo(x,y-9);ctx.lineTo(x-6,y+2);ctx.lineTo(x+6,y+2);}else{ctx.moveTo(x,y+9);ctx.lineTo(x-6,y-2);ctx.lineTo(x+6,y-2);}ctx.closePath();ctx.fillStyle=buy?"#06d6a0":"#ef476f";ctx.shadowColor=buy?"#06d6a0":"#ef476f";ctx.shadowBlur=10;ctx.fill();ctx.restore();});
    // Time axis
    ctx.fillStyle="rgba(255,255,255,0.18)";ctx.font="8px monospace";ctx.textAlign="center";const step=Math.max(1,Math.floor(candles.length/8));for(let i=0;i<candles.length;i+=step){const t=candles[i].time;ctx.fillText(`${t.getDate()}/${t.getMonth()+1} ${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`,xS(i),cB+14);}
    cv.onmousemove=e=>{const br=cv.getBoundingClientRect();const idx=Math.round(((e.clientX-br.left-cL)/cW)*(candles.length-1));if(idx>=0&&idx<candles.length)setTip({x:e.clientX-br.left,y:e.clientY-br.top,idx});};
    cv.onmouseleave=()=>setTip(null);
  },[candles,ind,signals,dec]);
  const c=tip?candles[tip.idx]:null;const sig=tip&&signals?signals[tip.idx]:null;
  return React.createElement("div",{style:{position:"relative",width:"100%",height:"100%"}},
    React.createElement("canvas",{ref,style:{width:"100%",height:"100%",display:"block",cursor:"crosshair"}}),
    tip&&c&&React.createElement("div",{style:{position:"absolute",left:Math.min(tip.x+12,400),top:Math.max(tip.y-80,4),background:"rgba(8,8,18,0.97)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"8px 12px",pointerEvents:"none",zIndex:50,fontFamily:"monospace",fontSize:10,color:"#aaa",backdropFilter:"blur(8px)",minWidth:155}},
      React.createElement("div",{style:{color:"#fff",fontWeight:600,fontSize:11,marginBottom:3}},`${c.time.getDate()}/${c.time.getMonth()+1} ${String(c.time.getHours()).padStart(2,"0")}:${String(c.time.getMinutes()).padStart(2,"0")}`),
      React.createElement("div",null,`O:${c.open.toFixed(dec)} H:${c.high.toFixed(dec)}`),
      React.createElement("div",null,`L:${c.low.toFixed(dec)} C:${c.close.toFixed(dec)}`),
      React.createElement("div",{style:{color:"rgba(255,255,255,0.25)"}},`Vol: ${(c.volume||0).toLocaleString("en-IN")}`),
      sig?.type&&React.createElement("div",{style:{marginTop:4,color:sig.type==="BUY"?"#06d6a0":"#ef476f",fontWeight:700}},`⚡ ${sig.type} (${(sig.strength*100).toFixed(0)}%)`)
    )
  );
}

/*═══════════════════════════════════════════════════════════════
  MINI RSI/MACD CHART
═══════════════════════════════════════════════════════════════*/
function MiniChart({data,isRSI,h=60}){
  const ref=useRef(null);
  useEffect(()=>{
